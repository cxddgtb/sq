name: Daily Update TVBox 色情接口

on:
  schedule:
    - cron: '0 16 * * *'      # UTC 16:00 ≈ 北京时间 00:00（可自行调整）
  workflow_dispatch:          # 手动触发测试

permissions:
  contents: write             # 必须，允许 push

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 执行爬取+测试+更新脚本
        run: python scripts/update_video.py

      - name: 自动 Commit & Push（仅在有变更时）
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🔄 Daily update: 已测试并保留可用色情接口 | ${{ github.run_id }}'
          file_pattern: video.json
          skip_dirty_check: false
