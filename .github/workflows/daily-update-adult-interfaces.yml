name: Daily Update TVBox 色情接口（GitHub raw 直链版）

on:
  schedule:
    - cron: '0 16 * * *'      # UTC 16:00 ≈ 北京时间 00:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 执行智能搜索+测试+生成 index.js.md5 + 输出 GitHub raw 直链
        run: python scripts/update_video.py

      - name: 自动 Commit & Push（仅变更时）
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🔄 Daily update: 色情接口 + index.js + index.js.md5（GitHub raw 直链） | ${{ github.run_id }}'
          file_pattern: video.json index.js index.js.md5
          skip_dirty_check: false
