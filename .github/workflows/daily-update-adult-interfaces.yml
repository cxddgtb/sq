name: Daily Update TVBox 色情接口（含 GitHub 智能搜索）

on:
  schedule:
    - cron: '0 16 * * *'      # UTC 16:00 ≈ 北京时间 00:00
  workflow_dispatch:          # 手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 执行智能搜索+爬取+测试+更新（已嵌入 GitHub 多源搜索）
        run: python scripts/update_video.py

      - name: 自动 Commit & Push（仅变更时）
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🔄 Daily update: GitHub 智能搜索 + 测试可用色情接口 | ${{ github.run_id }}'
          file_pattern: video.json
          skip_dirty_check: false
